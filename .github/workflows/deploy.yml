name: CI/CD - Build, Push ECR y Deploy en EC2

on:
  push:
    branches:
      - deploy

jobs:
  # ----------------------------------------------------------
  # JOB 1: BUILD + PUSH de los 4 contenedores a Amazon ECR
  # ----------------------------------------------------------
  build-and-push:
    name: Build y Push a ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 1. Build y Push -> Base de Datos
      - name: Build y Push Base de Datos
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/tienda-db:latest ./db
          docker push $ECR_REGISTRY/tienda-db:latest

      # 2. Build y Push -> Backend Despachos
      - name: Build y Push Backend Despachos
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/tienda-backend-despachos:latest ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          docker push $ECR_REGISTRY/tienda-backend-despachos:latest

      # 3. Build y Push -> Backend Ventas
      - name: Build y Push Backend Ventas
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/tienda-backend-ventas:latest ./back-Ventas_SpringBoot/Springboot-API-REST
          docker push $ECR_REGISTRY/tienda-backend-ventas:latest

      # 4. Build y Push -> Frontend (IP dinámica desde secrets)
      - name: Build y Push Frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build \
            --build-arg VITE_API_VENTAS="http://${{ secrets.EC2_HOST_FRONTEND }}:8080" \
            --build-arg VITE_API_DESPACHOS="http://${{ secrets.EC2_HOST_FRONTEND }}:8081" \
            -t $ECR_REGISTRY/tienda-frontend:latest ./front_despacho
          docker push $ECR_REGISTRY/tienda-frontend:latest

  # ----------------------------------------------------------
  # JOB 2: DEPLOY UNIFICADO EN LA INSTANCIA EC2 VÍA DOCKER COMPOSE
  # ----------------------------------------------------------
  deploy:
    name: Deploy con Docker Compose en EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Copiar archivos de configuración a EC2
      - name: Transferir archivos de configuración a EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST_FRONTEND }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,db/init.sql"
          target: "/home/ec2-user/app/"

      # Ejecutar el despliegue limpio en EC2
      - name: Levantar Stack de Servicios en EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_FRONTEND }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/app/

            # Autenticar Docker con Amazon ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}

            # Inyectar IP pública dinámica para el docker-compose
            export ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}

            # Descargar imágenes y recrear contenedores
            docker compose pull
            docker compose down
            docker compose up -d

            echo "🚀 ¡Infraestructura de microservicios actualizada con éxito!"