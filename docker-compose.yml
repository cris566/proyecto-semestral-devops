version: "3.9"

# ============================================================
# ARQUITECTURA:
#   - db          → MySQL 8.0  (subred privada, solo back accede)
#   - backend-ventas  → Spring Boot puerto 8080
#   - backend-despachos → Spring Boot puerto 8081
#   - frontend    → React/Vite con Nginx puerto 80
#
# PERSISTENCIA: named volume "db-data" para que los datos
# no se pierdan al reiniciar contenedores (named volume
# elegido sobre bind mount porque es portable entre equipos
# y Docker lo gestiona automáticamente).
# ============================================================

services:

  # ----------------------------------------------------------
  # MOTOR: MySQL 8.0
  # DRIVER: com.mysql.cj.jdbc.Driver  (declarado en pom.xml)
  # CLIENTE: Spring Boot via JDBC     (application.properties)
  # ----------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: tienda-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: tienda_db
      MYSQL_USER: tienda_user
      MYSQL_PASSWORD: tienda_pass
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql          # Named volume → persistencia
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql  # Script inicial
    networks:
      - red-privada
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # BACKEND VENTAS → puerto 8080
  # ----------------------------------------------------------
  backend-ventas:
    build:
      context: ./back-Ventas_SpringBoot/Springboot-API-REST 
      dockerfile: Dockerfile
    container_name: tienda-backend-ventas
    restart: always
    environment:
      DB_ENDPOINT: db           # nombre del servicio = hostname interno
      DB_PORT: 3306
      DB_NAME: tienda_db
      DB_USERNAME: tienda_user
      DB_PASSWORD: tienda_pass
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - red-privada
      - red-publica

  # ----------------------------------------------------------
  # BACKEND DESPACHOS → puerto 8081
  # ----------------------------------------------------------
  backend-despachos:
    build:
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
      dockerfile: Dockerfile
    container_name: tienda-backend-despachos
    restart: always
    environment:
      DB_ENDPOINT: db
      DB_PORT: 3306
      DB_NAME: tienda_db
      DB_USERNAME: tienda_user
      DB_PASSWORD: tienda_pass
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - red-privada
      - red-publica

  # ----------------------------------------------------------
  # FRONTEND → React/Vite servido por Nginx, puerto 80
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./front_despacho
      dockerfile: Dockerfile
      args:
        VITE_API_VENTAS: http://backend-ventas:8080
        VITE_API_DESPACHOS: http://backend-despachos:8081
    container_name: tienda-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend-ventas
      - backend-despachos
    networks:
      - red-publica

# ============================================================
# VOLÚMENES
# Named volume: Docker lo gestiona; datos sobreviven reinicios
# ============================================================
volumes:
  db-data:
    name: tienda-db-data

# ============================================================
# REDES INTERNAS
# red-privada: solo backend y db se comunican aquí
# red-publica: frontend y backends expuestos al exterior
# ============================================================
networks:
  red-privada:
    driver: bridge
  red-publica:
    driver: bridge
